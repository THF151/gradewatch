<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }} - gradewatch</title>
  <style>
    body { margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f6f6; color: #172026; }
    header { background: #102f36; color: white; padding: 20px 28px; }
    main { max-width: 760px; margin: 0 auto; padding: 24px; }
    .panel { background: white; border: 1px solid #d8e0e4; border-radius: 8px; padding: 20px; }
    .button { display: inline-flex; align-items: center; justify-content: center; min-height: 36px; padding: 0 12px; border-radius: 6px; border: 1px solid #12646f; background: #12646f; color: white; text-decoration: none; font-weight: 650; margin-top: 16px; }
  </style>
</head>
<body>
  <header><h1>{{ title }}</h1></header>
  <main>
    <div class="panel">
      <p>{{ message }}</p>
      <a class="button" href="/">Back</a>
    </div>
  </main>
</body>
</html>
